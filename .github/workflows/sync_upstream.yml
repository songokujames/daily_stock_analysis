name: sync_upstream

on:
  schedule:
    - cron: '0 */6 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout fork
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Add upstream
        run: |
          git remote add upstream https://github.com/ZhuLinsen/daily_stock_analysis.git
          git fetch upstream

      - name: Merge upstream main
        run: |
          git checkout main
          git merge upstream/main --no-edit || true

      - name: Push synced main
        run: |
          git push origin main
